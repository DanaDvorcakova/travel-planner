<h2>Search Results</h2>

{% if results %}
    {% for place in results %}
        <div class="card mb-2 p-3 place-card">
            <h5>{{ place.name }}</h5>

            <form method="POST" action="{% url 'save_place_from_search' %}">
                {% csrf_token %}
                <input type="hidden" name="name" value="{{ place.name }}">
                <input type="hidden" name="location" value="{{ place.name }}">

                <button type="submit" class="btn btn-success save-btn">Save</button>
            </form>
        </div>
    {% endfor %}
{% else %}
    <p class="text-muted">No places found.</p>
{% endif %}
