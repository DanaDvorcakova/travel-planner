{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-5">

        <div class="card shadow-sm p-4">

            <h3 class="text-center mb-3">Set New Password</h3>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    {{ form.as_p }}
                </div>

                <button class="btn btn-success w-100">
                    Reset Password
                </button>
            </form>

        </div>

    </div>
</div>

{% endblock %}
