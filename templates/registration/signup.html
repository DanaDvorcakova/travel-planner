{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="auth-page">

    <div class="auth-container">

        <div class="auth-card">

            <h2 class="auth-title text-center mb-3">
                Create your account
            </h2>

            <p class="auth-subtitle text-center mb-4">
                Start planning your dream trips today
            </p>

            <form method="POST">
                {% csrf_token %}

                {{ form.as_p }}

                <button class="btn btn-primary w-100 mt-2">
                    Sign up
                </button>

            </form>

            <div class="text-center small mt-3">
                Already have an account?
                <a href="{% url 'login' %}" class="auth-link">Log in</a>
            </div>

        </div>

    </div>

</div>

{% endblock %}
