<!-- DELETE BUTTON -->
<button type="button" class="btn btn-outline-danger rounded-4 px-4" data-bs-toggle="modal"
    data-bs-target="#deleteModal{{ object.id }}">

    {{ button_text|default:"Delete" }}
</button>

<!-- DELETE MODAL -->
<div class="modal fade" id="deleteModal{{ object.id }}" tabindex="-1" aria-hidden="true">

    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow rounded-4 p-2">

            <div class="modal-header border-0 justify-content-center">
                <h2 class="text-danger fw-semibold">
                    {{ modal_title|default:"Delete" }}
                </h2>
            </div>

            <div class="modal-body text-center">

                <p class="fs-5 mb-4">
                    {{ modal_message|default:"Are you sure?" }}
                </p>

                <div class="bg-light rounded-4 p-4 mb-4">

                    <h4 class="fw-bold mb-2">
                        {{ object }}
                    </h4>

                    {% if subtitle %}
                    <p class="text-muted mb-2">
                        📍 {{ subtitle }}
                    </p>
                    {% endif %}

                    {% if extra_info %}
                    <p class="text-muted mb-0">
                        📅 {{ extra_info }}
                    </p>
                    {% endif %}

                </div>

                <div class="d-flex justify-content-center gap-3">

                    <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">

                        Cancel
                    </button>

                    <form method="post" action="{{ delete_url }}">
                        {% csrf_token %}

                        <button type="submit" class="btn btn-danger px-4">

                            Yes, Delete
                        </button>

                    </form>

                </div>

            </div>

        </div>
    </div>

</div>
