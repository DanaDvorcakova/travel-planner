<!-- Modal Trigger -->
<button type="button" class="btn btn-outline-danger btn-sm rounded-pill px-3"
        data-bs-toggle="modal"
        data-bs-target="#deleteTripModal{{ trip.id }}">
    Delete Trip
</button>

<!-- Delete Modal -->
<div class="modal fade" id="deleteTripModal{{ trip.id }}" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow rounded-4 p-2">

            <div class="modal-header border-0 justify-content-center">
                <h2 class="text-danger fw-semibold">Delete Trip</h2>
            </div>

            <div class="modal-body text-center">
                <p class="fs-5 mb-4">Are you sure you want to delete this trip?</p>

                <div class="bg-light rounded-4 p-4 mb-4">
                    <h4 class="fw-bold mb-2">{{ trip.title }}</h4>
                    <p class="text-muted mb-2">📍 {{ trip.destination }}</p>
                    <p class="text-muted mb-0">📅 {{ trip.start_date }} → {{ trip.end_date }}</p>
                </div>

                <div class="d-flex justify-content-center gap-3">
                    <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">
                        Cancel
                    </button>

                    <form method="post" action="{% url 'delete_trip' trip.id %}">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger px-4">Delete Trip</button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
